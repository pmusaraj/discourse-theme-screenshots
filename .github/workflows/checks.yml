name: Project checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test
      - name: Build static gallery shell
        run: ruby bin/build-gallery --out public
