discourse:
  repo_path: ../discourse

screenshot:
  devices: desktop
  dir: ../discourse/tmp/theme-screenshots-github
  width: 2560
  height: 1440
  format: png
  max_bytes: 1048576

themes:
  - id: foundation
    name: Foundation
    source:
      type: core
      theme: foundation
    modes: [light]
  - id: horizon
    name: Horizon
    source:
      type: core
      theme: horizon
    modes: [light]
  - id: discourse-verso
    name: Discourse Verso
    source:
      type: git
      url: https://github.com/pmusaraj/discourse-verso.git
    modes: [light]
  - id: air-theme
    name: Air Theme
    source:
      type: git
      url: https://github.com/Discourse/discourse-air.git
    modes: [light]
  - id: mint-theme
    name: Mint Theme
    source:
      type: git
      url: https://github.com/Discourse/discourse-mint-theme.git
    modes: [light]
  - id: minima
    name: Minima
    source:
      type: git
      url: https://github.com/Discourse/minima.git
    modes: [light]
  - id: discourse-skills
    name: Discourse Skills
    source:
      type: git
      url: https://github.com/discourse/discourse-theme-skills.git
    modes: [light]
  - id: accent
    name: Accent
    source:
      type: git
      url: https://github.com/pmusaraj/discourse-accent.git
    modes: [light]
