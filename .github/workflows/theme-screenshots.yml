name: Theme screenshots

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Optional theme id from config/github.yml"
        required: false
        type: string
      subset:
        description: "Optional SCREENSHOTS_SUBSET override"
        required: false
        type: string
      devices:
        description: "Comma-separated SCREENSHOTS_DEVICES override"
        required: false
        default: desktop,mobile
        type: string
  schedule:
    - cron: "17 5 * * *"

concurrency:
  group: theme-screenshots
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  RAILS_ENV: test
  PGUSER: discourse
  PGPASSWORD: discourse
  USES_PARALLEL_DATABASES: true
  PARALLEL_TEST_PROCESSORS: 2
  CAPYBARA_DEFAULT_MAX_WAIT_TIME: 20
  MINIO_RUNNER_LOG_LEVEL: WARN
  CHEAP_SOURCE_MAPS: "1"
  DBUS_SESSION_BUS_ADDRESS: "unix:path=/dev/null"
  MINIO_RUNNER_INSTALL_DIR: /home/discourse/.minio_runner
  EMBER_ENV: development
  LOAD_PLUGINS: "1"
  QUNIT_REUSE_BUILD: 1
  THEME_SCREENSHOTS_CONFIG: config/github.yml

jobs:
  capture:
    runs-on: ubuntu-latest
    container: discourse/discourse_test:release
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Enable jemalloc
        run: echo /usr/lib/libjemalloc.so.1 > /etc/ld.so.preload

      - name: Checkout screenshot project
        uses: actions/checkout@v6
        with:
          path: theme-screenshots

      - name: Checkout Discourse
        uses: actions/checkout@v6
        with:
          repository: discourse/discourse
          path: discourse
          fetch-depth: 1

      - name: Setup Git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE/theme-screenshots"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/discourse"
          git config --global user.email "ci@ci.invalid"
          git config --global user.name "Theme Screenshots CI"

      - name: Start redis
        working-directory: discourse
        run: redis-server /etc/redis/redis.conf &

      - name: Start Postgres
        working-directory: discourse
        run: |
          chown -R postgres /var/run/postgresql
          sudo -E -u postgres script/start_test_db.rb
          sudo -u postgres psql -c "CREATE ROLE $PGUSER LOGIN SUPERUSER PASSWORD '$PGPASSWORD';"

      - name: Symlink vendor/bundle from image
        working-directory: discourse
        run: ln -s /var/www/discourse/vendor/bundle vendor/bundle

      - name: Setup Discourse gems
        working-directory: discourse
        run: |
          bundle config --local path vendor/bundle
          bundle config --local deployment true
          bundle config --local without development
          bundle install --jobs $(($(nproc) - 1))
          bundle clean

      - name: Install Discourse JavaScript dependencies
        working-directory: discourse
        run: pnpm install --frozen-lockfile

      - name: Create and migrate database
        working-directory: discourse
        run: |
          bin/rake db:create
          script/silence_successful_output bin/rake db:migrate
          bin/rake parallel:create
          script/silence_successful_output bin/rake parallel:migrate

      - name: Build Discourse assets for system specs
        working-directory: discourse
        run: script/assemble_ember_build.rb

      - name: Install Playwright Chromium
        working-directory: discourse
        run: pnpm playwright install --with-deps --no-shell chromium

      - name: Capture theme screenshots
        working-directory: theme-screenshots
        env:
          CHECKOUT_TIMEOUT: 10
          RAILS_ENABLE_TEST_LOG: 1
          RAILS_TEST_LOG_LEVEL: error
          THEME_INPUT: ${{ github.event.inputs.theme }}
          SUBSET_INPUT: ${{ github.event.inputs.subset }}
          DEVICES_INPUT: ${{ github.event.inputs.devices || 'desktop' }}
        run: |
          args=(--config "$THEME_SCREENSHOTS_CONFIG" --out public)
          if [ -n "$THEME_INPUT" ]; then
            args+=(--theme "$THEME_INPUT")
          fi
          if [ -n "$SUBSET_INPUT" ]; then
            args+=(--subset "$SUBSET_INPUT")
          fi
          if [ -n "$DEVICES_INPUT" ]; then
            args+=(--devices "$DEVICES_INPUT")
          fi
          ruby bin/screenshot-themes "${args[@]}"
          ruby bin/verify-output --out public

      - name: Upload screenshot site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: theme-screenshots/public

      - name: Upload raw screenshot artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: theme-screenshots-public
          if-no-files-found: ignore
          path: theme-screenshots/public

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: capture
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
